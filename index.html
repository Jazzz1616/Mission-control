<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mission Control 🚀</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚀 Mission Control Dashboard</h1>

<div class="grid">

  <div class="card">
    <h2>👨‍🚀 Astronauts</h2>
    <ul id="astroList"></ul>
  </div>

  <div class="card">
    <h2>🌍 ISS Location</h2>
    <p id="issLocation">Loading...</p>
  </div>

  <div class="card">
    <h2>⏳ Countdown</h2>
    <p id="countdown">Loading...</p>
  </div>

  <div class="card">
    <h2>📰 Space Updates</h2>
    <ul id="news"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
